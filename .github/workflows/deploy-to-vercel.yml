name: Deploy to Vercel

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      production:
        description: Deploy production instead of preview
        required: true
        type: boolean
        default: false

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.production == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: |
          vercel pull --yes \
            --environment=preview \
            --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Show preview URL
        run: echo "Preview deployed at ${{ steps.deploy.outputs.preview_url }}"

  deploy-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.production == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: |
          vercel pull --yes \
            --environment=production \
            --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        id: deploy_prod
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "production_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Show production URL
        run: echo "Production deployed at ${{ steps.deploy_prod.outputs.production_url }}"
